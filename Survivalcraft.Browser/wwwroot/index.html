<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="modulepreload" href="./main.js" />
    <link rel="modulepreload" href="./_framework/dotnet.js" />
    <title>Survivalcraft 2.4 - API 1.9</title>
    <link rel="icon" type="image/webp" href="./favicon.webp" />
    <link rel="manifest" href="./manifest.json" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            overflow: hidden;
        }

        #canvas {
            outline: none;
            margin: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #splash {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: black;
        }

        #splashLogo {
            position: absolute;
            top: 50%;
            left: 50%;
            max-width: 80vw;
            transform: translate(-50%, -50%);
        }

        #splashBusyBar {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translate(-50%, 0);
            width: 180px;
            display: flex;
            justify-content: space-between;
            flex-wrap: nowrap;
            align-items: center;
            & > div {
                width: 12px;
                height: 12px;
                margin-left: 3px;
                margin-right: 3px;
                background-color: rgb(48, 48, 48);
            }
            & > .lit {
                width: 18px;
                height: 18px;
                margin-left: 0;
                margin-right: 0;
                background-color: rgb(16, 140, 0);
            }
        }

        #splashRightBottomBar {
            position: absolute;
            bottom: 12px;
            right: 12px;
        }

        .beveledButton {
            display: block;
            width: 72px;
            height: 72px;
            box-sizing: border-box;
            border-radius: 9px;
            margin: 9px;
            padding: 3px;
            background: linear-gradient(165deg, rgb(181, 172, 154), rgb(36.2, 34.4, 30.8));
            box-shadow: rgba(0, 0, 0, 0.125) 3px 3px;

            &:active {
                background: linear-gradient(-15deg, rgb(181, 172, 154), rgb(36.2, 34.4, 30.8));
            }

            & > .beveledButtonContent {
                width: 100%;
                height: 100%;
                border-radius: 9px;
                background-color: rgb(108.6, 103.2, 92.4);
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas" tabIndex="0"></canvas>
    <div id="splash">
        <div id="splashLogo">
            <img src="./assets/logo.webp" style="width: 1024px; max-width: 80vw;" alt="logo" />
        </div>
        <div id="splashBusyBar">
            <div class="lit"></div>
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div id="splashRightBottomBar">
            <a class="beveledButton" href="./dashboard.html" target="_blank">
                <div class="beveledButtonContent">
                    <img src="assets/BugReport.webp" alt="Open Dashboard" style="width: 42px; height: 42px; margin-top: 12px; margin-left: 12px;"/>
                </div>
            </a>
        </div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
